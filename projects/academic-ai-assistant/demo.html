                .replace(/（附链接：/g, '（附链接：<a href="')
                .replace(/">/g, '" target="_blank">')
                .replace(/）/g, '</a>）');

            // 渲染参考文献，添加追问按钮
            sourcesList.innerHTML = '';
            if (sources && sources.length > 0) {
                sources.forEach(source => {
                    const sourceItem = document.createElement('div');
                    sourceItem.className = 'source-item';

                    // 论文标题（带链接）
                    const title = document.createElement('div');
                    title.className = 'source-title';
                    title.innerHTML = `<a href="${source.url}" target="_blank">${source.title}</a>`;

                    // 元信息（作者+期刊）
                    const meta = document.createElement('div');
                    meta.className = 'source-meta';
                    meta.innerHTML = `
                        <span>👤 作者：${source.authors || '未知'}</span>
                        <span>📑 期刊：${source.publication || '未知'}</span>
                    `;

                    // 摘要内容
                    const content = document.createElement('div');
                    content.className = 'source-content';
                    content.textContent = source.content || '无摘要信息';
                    
                    // 添加追问按钮
                    const actions = document.createElement('div');
                    actions.className = 'source-actions';
                    const followUpBtn = document.createElement('button');
                    followUpBtn.className = 'follow-up-btn';
                    followUpBtn.innerHTML = '🔍 追问这篇文章';
                    followUpBtn.onclick = () => openFollowUpDialog(
                        source.title, 
                        source.full_context || source.content,
                        source.url
                    );
                    actions.appendChild(followUpBtn);

                    // 组装元素
                    sourceItem.appendChild(title);
                    sourceItem.appendChild(meta);
                    sourceItem.appendChild(content);
                    sourceItem.appendChild(actions);
                    sourcesList.appendChild(sourceItem);
                });
            } else {
                sourcesList.innerHTML = '<div style="text-align:center; color:#7f8c8d; padding:20px;">暂无参考文献</div>';
            }
        }

        // 显示错误信息
        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
            // 3秒后自动隐藏错误
            setTimeout(() => {
                error.style.display = 'none';
            }, 5000);
        }

        // 重置所有状态
        function resetStates() {
            error.style.display = 'none';
            resultSection.style.display = 'none';
            summaryContent.innerHTML = '';
            sourcesList.innerHTML = '';
        }

        // 回车触发搜索（优化体验）
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                searchBtn.click();
            }
        });

        // ========== 追问功能相关函数（伪交互） ==========

        // 打开追问对话框
        function openFollowUpDialog(paperTitle, paperContext, paperUrl) {
            currentPaper = {
                title: paperTitle,
                context: paperContext,
                url: paperUrl
            };
            
            document.getElementById('dialogPaperTitle').textContent = paperTitle;
            document.getElementById('followUpInput').value = '';
            document.getElementById('followUpAnswer').classList.remove('show');
            document.getElementById('followUpAnswerContent').innerHTML = '';
            document.getElementById('followUpDialog').style.display = 'flex';
        }

        // 关闭追问对话框
        function closeFollowUpDialog() {
            document.getElementById('followUpDialog').style.display = 'none';
        }

        // 提交追问（伪交互）
        function submitFollowUp() {
            const question = document.getElementById('followUpInput').value.trim();
            if (!question) {
                alert('请输入问题！');
                return;
            }
            
            // 显示加载状态
            document.getElementById('followUpLoading').style.display = 'block';
            document.getElementById('followUpAnswer').classList.remove('show');
            
            // 模拟接口延时（1.5秒）
            setTimeout(() => {
                try {
                    // 渲染模拟回答
                    document.getElementById('followUpAnswerContent').innerHTML = mockFollowUpAnswer(question);
                    document.getElementById('followUpAnswer').classList.add('show');
                } catch (error) {
                    alert('追问失败：' + error.message);
                } finally {
                    document.getElementById('followUpLoading').style.display = 'none';
                }
            }, 1500);
        }
    </script>
</body>
</html>
